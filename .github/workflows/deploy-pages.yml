name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/project-setup-64lhal
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and mint an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          DOCS_SITE: https://anothernocoder.github.io
          DOCS_BASE: /moderno
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
